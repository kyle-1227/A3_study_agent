services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: a3_study_agent
      POSTGRES_USER: a3_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-a3_study_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a3_user -d a3_study_agent"]
      interval: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
      - "3000:3000"
    env_file: .env
    environment:
      - DB_URI=postgresql://a3_user:${POSTGRES_PASSWORD:-a3_study_dev}@postgres:5432/a3_study_agent
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_store
      - ./data:/app/data
      - ./indexes/parent_child:/app/indexes/parent_child:ro

  jaeger:
    image: jaegertracing/jaeger:2
    ports:
      - "16686:16686"
      - "4317:4317"
    profiles:
      - observability

volumes:
  pgdata:
  chroma_data:
