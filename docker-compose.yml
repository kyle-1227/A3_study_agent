services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: a3_study_agent
      POSTGRES_USER: a3_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a3_user -d a3_study_agent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    restart: unless-stopped
    env_file:
      - path: ${A3_ENV_FILE:?Set A3_ENV_FILE to an explicit env file path}
        required: true
    environment:
      CHECKPOINTER_ENABLED: "true"
      CHECKPOINTER_TYPE: postgres
      DB_URI: postgresql://a3_user:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/a3_study_agent
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 240s
    volumes:
      - type: volume
        source: app_state
        target: /app/.runtime_state
        read_only: false
      - type: bind
        source: ${COURSE_DATA_HOST_PATH:?Set COURSE_DATA_HOST_PATH in .env}
        target: /app/data
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${PARENT_CHILD_INDEX_HOST_PATH:?Set PARENT_CHILD_INDEX_HOST_PATH in .env}
        target: /app/indexes/parent_child
        read_only: true
        bind:
          create_host_path: false
      - rag_runtime_chroma:/app/indexes/parent_child/.runtime_chroma
      - artifacts:/app/artifacts

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000').then(response=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

  jaeger:
    image: jaegertracing/jaeger:2
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
    profiles:
      - observability

volumes:
  pgdata:
  rag_runtime_chroma:
  artifacts:
  app_state:
