# A3 Study Agent - System Logic Parameters
# Loaded by src/config/config_manager.py at runtime.

academic:
  max_retries: 2                        # Hallucination retry loop limit
  search_timeout: 6                     # Default external evidence timeout (seconds)
  temperature: 0.7                      # Answer generation temperature
  max_tokens: 4096                      # Answer bubble output budget (doubled)
  hallucination_eval_temperature: 0.0   # Evaluation requires determinism

development:
  fail_fast_structured_output: true      # Structured Pydantic calls fail visibly in development
  fail_fast_evidence_judge: true         # Evidence Judge failure interrupts graph in development
  enable_dev_memory_clear: true          # Dev-only API to clear persistent memory for a thread

provider_transport_retry:
  max_retries: 2                         # Retry transient provider transport errors 1-3 times
  base_delay_seconds: 0.25               # Linear backoff base delay between retry attempts

structured_output:
  manifest:
    enabled: true
    max_chars: 6000
    include_descriptions: true
    include_constraints: true
    include_enum_values: true
  drift_guards:
    default:
      global_forbidden_output_fields:
        - metadata
        - debug
        - raw
        - raw_output
      global_forbidden_aliases:
        reason:
          - rationale
          - explanation
          - why
    web_source_summarizer:
      forbidden_output_fields:
        - task_id
        - subject
        - role
        - purpose
        - search_query
        - url
        - title
        - domain
        - canonical_url
        - original_url
      canonical_aliases:
        coverage_points:
          - key_points
          - points
          - coverage
        evidence_type:
          - type
          - category
        use_case:
          - usage
          - purpose
          - role
    evidence_item_grader:
      forbidden_output_fields:
        - source_id
        - url
        - title
        - metadata
      canonical_aliases:
        coverage_contribution:
          - coverage
          - contribution
          - coverage_reason
          - support_reason
          - supports
    evidence_sufficiency_judge:
      canonical_aliases:
        gap:
          - topic
          - description
          - missing_topic
        suggested_search_query:
          - query
          - search_query
          - followup_query

checkpointer:
  enabled: true                         # Enable LangGraph state snapshots for SSE final state
  type: memory                          # memory for local/demo; set postgres with DB_URI for persistence

web_search:
  provider: tavily                       # Web Research executor provider
  timeout_seconds: 120                   # Timeout per web research task
  max_query_chars: 160                   # Keep search queries short without breaking key phrases
  tavily:
    enabled: true
    api_key_env: TAVILY_API_KEY
    search_depth: basic
    max_results: 5
    include_answer: false
    include_raw_content: false
    include_images: false
    include_favicon: true
    topic: general
    include_usage: true
  preserve_key_phrases: true              # Preserve common complete technical phrases in compacted queries

retrieval:
  mode: dual_source_evidence               # local RAG + Web Research evidence -> unified Evidence Judge
  dual_source_evidence:
    block_generation_when_evidence_judge_failed: true
  evidence_judge_v2:
    enabled: true
    item_batch_size: 5
    allow_sufficiency_deterministic_fallback: false
    expose_fallback_trace: true
    strict_observability: true
  web_research_v2:
    scope: dual_source_evidence_only
    enabled: true
    fail_fast: true
    allow_empty_web_evidence_on_failure: false
    max_tasks_per_subject: 2
    max_total_tasks: 6
    max_results_per_task: 3
    source_summary_batch_size: 6
    summarize_sources: true
    expose_fallback_trace: true
    strict_observability: true
  local_rag:
    enabled: true
    per_subject_top_k: 3
  web:
    enabled: true
    provider: tavily
    max_results_per_query: 3
    timeout_seconds: 120
  fusion:
    max_context_docs: 8
    max_evidence_candidates: 16
    max_local_candidates: 8
    max_web_candidates: 8
    preserve_source_type_balance: true
    min_local_docs_if_available: 1
    min_web_docs_if_available: 1
  evidence_refinement:
    enabled: false
    reserved: true
    max_rounds: 1
    search_optimization_reserved: true

