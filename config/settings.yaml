# ═══════════════════════════════════════════════════════════════════════════
# Long-term Memory System
# ═══════════════════════════════════════════════════════════════════════════
memory:
  # Storage
  db_path: "data/memory.db"
  backend: "sqlite"

  # Embedding. Production config only supports real providers.
  embedding_provider: "openrouter"
  embedding:
    model: "nvidia/llama-nemotron-embed-vl-1b-v2:free"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    timeout_seconds: 30

  # Retrieval
  retrieval:
    top_k_episodic: 3
    top_k_semantic: 2
    keyword_weight: 0.4
    vector_weight: 0.6
    importance_boost: 0.1               # Bonus added to score for high-importance memories

  # Consolidation
  consolidation_episodic_threshold: 5   # Consolidate after N unconsolidated episodic
  consolidation_max_per_batch: 5         # Max episodic events per consolidation batch
  background_enabled: true               # Enable fire-and-forget background consolidation

  # Forgetting
  forgetting_retention_days: 30          # Delete episodic older than this
  forgetting_importance_min: 0.2         # Only delete episodic below this importance
  forgetting_duplicate_similarity: 0.95  # Cosine similarity threshold for duplicate detection

  # Legacy memory-only budget (approximate character counts).
  # This is not a model context window, not an agent-wide context budget,
  # and not DeepSeek's 1M context. Phase 1 should add explicit
  # context_engineering.model_limits and node_policies.
  token_budget:
    system_prompt: 500
    user_profile: 300
    episodic_memories: 800
    semantic_summary: 400
    current_task: 500
    rag_evidence: 1500
    conversation_summary: 200
    total_budget: 4096
    buffer: 96

  # Development
  fail_fast_memory_write: false          # Non-fatal by default
  log_memory_retrieval: true             # Trace retrieval decisions

# ═══════════════════════════════════════════════════════════════════════════
# Dynamic Curriculum Engine
# ═══════════════════════════════════════════════════════════════════════════
curriculum:
  knowledge_graph_path: "data/knowledge_graph.yaml"
  default_difficulty: 0.5

  path_planner:
    skip_threshold: 0.8              # skill.level above this → skip
    confidence_threshold: 0.7        # skill.confidence above this → reliable to skip
    reinforce_min: 0.3               # skill.level 0.3–0.8 → reinforce
    repeat_window_days: 7            # recent failures within this window → repeat

# ═══════════════════════════════════════════════════════════════════════════
# Memory-driven Recommendation Engine
# ═══════════════════════════════════════════════════════════════════════════
recommendation:
  top_n: 10
  weights:
    weakness: 0.35
    forgetting: 0.25
    preference: 0.15
    goal: 0.25
  decay_days: 14                     # Forgetting curve half-life (sigmoid midpoint)
  min_score_threshold: 0.2           # Don't recommend resources below this combined score

# ═══════════════════════════════════════════════════════════════════════════
# Adaptive Learning Loop (Assessment)
# ═══════════════════════════════════════════════════════════════════════════
assessment:
  error_classifier:
    temperature: 0.0
  practice_generator:
    temperature: 0.2
    max_adaptive_tasks: 5
  spaced_repetition:
    intervals: [1, 3, 7, 14, 30]     # Ebbinghaus review intervals (days)
    max_intervals: 5

# Strict, content-free validation for generated resource artifacts.
resource_validation:
  max_file_bytes: 134217728
  allowed_remote_schemes: ["https", "http"]
  sensitive_query_keys:
    ["token", "signature", "credential", "secret", "key", "auth", "cookie", "password", "expires", "x-amz", "sig"]
  allowed_suffixes:
    mindmap: [".xmind"]
    quiz: [".md", ".docx"]
    review_doc: [".md", ".docx"]
    code_practice: [".md", ".docx", ".py"]
    video_script: [".md", ".docx", ".srt"]
    video_animation: [".mp4", ".html", ".json", ".srt"]
    study_plan: [".md", ".docx"]
