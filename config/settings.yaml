planner:
  search_timeout: 15                    # Planning context search timeout (seconds)
  temperature: 0.7                      # Plan generation temperature
  reviewer_temperature: 0.0             # Reviewers need deterministic structured output
  adversarial_max_rounds: 3             # Max drafter-reviewer iterations

emotional:
  temperature: 0.8                      # Slightly creative for empathy

mindmap:
  temperature: 0.2                      # Structured JSON tree generation
  reviewer_temperature: 0.0             # Deterministic mindmap quality review
  max_generation_rounds: 3              # Initial generation + up to 2 rewrites

exercise:
  temperature: 0.2                      # Structured leveled exercise generation
  reviewer_temperature: 0.0             # Deterministic exercise quality review
  max_generation_rounds: 3              # Initial generation + up to 2 rewrites

rag:
  vector_top_k: 10                      # Candidates from vector search
  bm25_top_k: 10                        # Candidates from BM25 keyword search
  reranker_top_n: 5                     # Results after reranking
  relevance_threshold: 0.3              # Minimum score for a "hit"
  reranker_model: "BAAI/bge-reranker-v2-m3"
  reranker_base_url: "https://api.siliconflow.cn/v1"
  multi_subject_per_subject_top_k: 3     # Per-subject docs for retrieval_plan RAG
  multi_subject_max_docs: 8              # Final merged docs across subjects
  multi_subject_subject_max_docs: 3       # Max docs per subject in merged multi-subject context
  multi_subject_primary_extra_docs: 1     # Extra docs allowed for primary subject
  multi_subject_weak_max_docs: 1          # Max weak-evidence docs per subject
  branch_usable_threshold: 0.45           # Minimum score for usable local evidence
  branch_strong_threshold: 0.7            # Minimum score for strong local evidence

supervisor:
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  temperature: 0.0                      # Deterministic intent routing
  valid_intents:
    - academic
    - planning
    - emotional
    - unknown

