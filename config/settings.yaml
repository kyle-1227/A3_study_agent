# Gaokao Tutor — System Logic Parameters
# Loaded by src/config/config_manager.py at runtime.

academic:
  max_retries: 2                        # Hallucination retry loop limit
  search_timeout: 6                     # Legacy/general web search timeout (seconds)
  temperature: 0.7                      # Answer generation temperature
  max_tokens: 4096                      # Answer bubble output budget (doubled)
  hallucination_eval_temperature: 0.0   # Evaluation requires determinism

checkpointer:
  enabled: true                         # Enable LangGraph state snapshots for SSE final state
  type: memory                          # memory for local/demo; set postgres with DB_URI for persistence

web_search:
  conditional_supplement_enabled: true   # Let rag_retrieve handle branch-aware web supplement
  skip_general_when_conditional: true     # Skip old fan-out web_search for academic/planning
  skip_general_when_multi_subject: true   # Compatibility switch for previous multi-subject behavior
  timeout_seconds: 4                      # Timeout per dynamic web supplement attempt
  max_total_attempts: 3                   # Global dynamic web attempts per request
  max_attempts_per_subject: 2             # Dynamic web attempts per subject branch
  max_supplement_subjects: 2              # Max subjects selected for web supplement
  max_results_per_attempt: 2              # Max web results used from one attempt
  max_query_chars: 160                    # Keep supplement queries short without breaking key phrases
  preserve_key_phrases: true              # Preserve common complete technical phrases in compacted queries
  retry_failed_subjects_first: true        # Give failed/no-result subjects the next retry opportunity
  stop_subject_after_success: true         # Do not spend more budget once a subject has enough usable Web supplement
  min_results_per_subject: 1               # Minimum usable results before a subject is considered successful
  min_web_quality_score: 0.45              # Drop low-quality Web results below this score
  prefer_quality_over_rank: true           # Sort Web results by quality before original rank
  allow_low_quality_if_no_alternative: false # Keep low-quality results out of context by default
  max_dropped_results_preview: 3           # A3_TRACE preview count for dropped low-quality results
  llm_decision_enabled: true              # Use LLM coverage decision before rule fallback
  max_purposes_per_subject: 4             # Cap purpose labels per subject decision
  max_plan_items_per_subject: 3           # Cap search queries per subject decision

planner:
  search_timeout: 15                    # Policy search timeout (seconds)
  temperature: 0.7                      # Plan generation temperature
  reviewer_temperature: 0.0             # Reviewers need deterministic structured output
  adversarial_max_rounds: 3             # Max drafter-reviewer iterations

emotional:
  temperature: 0.8                      # Slightly creative for empathy

mindmap:
  temperature: 0.2                      # Structured JSON tree generation
  reviewer_temperature: 0.0             # Deterministic mindmap quality review
  max_generation_rounds: 3              # Initial generation + up to 2 rewrites

exercise:
  temperature: 0.2                      # Structured leveled exercise generation
  reviewer_temperature: 0.0             # Deterministic exercise quality review
  max_generation_rounds: 3              # Initial generation + up to 2 rewrites

rag:
  vector_top_k: 10                      # Candidates from vector search
  bm25_top_k: 10                        # Candidates from BM25 keyword search
  reranker_top_n: 5                     # Results after reranking
  relevance_threshold: 0.3              # Minimum score for a "hit"
  reranker_model: "BAAI/bge-reranker-v2-m3"
  reranker_base_url: "https://api.siliconflow.cn/v1"
  multi_subject_per_subject_top_k: 3     # Per-subject docs for retrieval_plan RAG
  multi_subject_max_docs: 8              # Final merged docs across subjects
  multi_subject_subject_max_docs: 3       # Max docs per subject in merged multi-subject context
  multi_subject_primary_extra_docs: 1     # Extra docs allowed for primary subject
  multi_subject_weak_max_docs: 1          # Max weak-evidence docs per subject
  branch_usable_threshold: 0.45           # Minimum score for usable local evidence
  branch_strong_threshold: 0.7            # Minimum score for strong local evidence

supervisor:
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  temperature: 0.0                      # Deterministic intent routing
  valid_intents:
    - academic
    - planning
    - emotional
    - unknown

query_rewrite:
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  temperature: 0.0                      # Deterministic retrieval-query rewriting
  max_tokens: 1000
  streaming: false

web_coverage_decision:
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  temperature: 0.0
  max_tokens: 10000
  streaming: false

hallucination_eval:
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  temperature: 0.0                      # Deterministic answer faithfulness evaluation
  max_tokens: 1000
  streaming: false
