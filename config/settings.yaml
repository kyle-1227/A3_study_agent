    streaming: false
  web_coverage_decision:
    provider: openrouter
    model: "deepseek/deepseek-v4-flash"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    temperature: 0.0
    max_tokens: 1600
    streaming: false
  search_result_judge:
    provider: openrouter
    model: "deepseek/deepseek-v4-flash"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    temperature: 0.0
    max_tokens: 1200
