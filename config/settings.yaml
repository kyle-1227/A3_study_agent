# A3 Study Agent — System Logic Parameters
# Loaded by src/config/config_manager.py at runtime.

academic:
  max_retries: 2                        # Hallucination retry loop limit
  search_timeout: 6                     # Legacy/general web search timeout (seconds)
  temperature: 0.7                      # Answer generation temperature
  max_tokens: 4096                      # Answer bubble output budget (doubled)
  hallucination_eval_temperature: 0.0   # Evaluation requires determinism

development:
  fail_fast_structured_output: true      # Structured Pydantic calls fail visibly in development
  fail_fast_evidence_judge: true         # Evidence Judge failure interrupts graph in development

checkpointer:
  enabled: true                         # Enable LangGraph state snapshots for SSE final state
  type: memory                          # memory for local/demo; set postgres with DB_URI for persistence

web_search:
  provider: tavily                       # Tavily is the only Web Search provider; no fallback
  conditional_supplement_enabled: true   # Let rag_retrieve handle branch-aware web supplement
  skip_general_when_conditional: true     # Skip old fan-out web_search for academic/planning
  skip_general_when_multi_subject: true   # Compatibility switch for previous multi-subject behavior
  timeout_seconds: 30                      # Timeout per Tavily web supplement attempt
  max_total_attempts: 3                   # Global dynamic web attempts per request
  max_attempts_per_subject: 2             # Dynamic web attempts per subject branch
  max_supplement_subjects: 2              # Max subjects selected for web supplement
  max_results_per_attempt: 3              # Max web results used from one attempt
  max_query_chars: 160                    # Keep supplement queries short without breaking key phrases
  tavily:
    enabled: true
    api_key_env: TAVILY_API_KEY
    search_depth: basic
    max_results: 5
    include_answer: false
    include_raw_content: false
    include_images: false
    include_favicon: true
    topic: general
    include_usage: true
  preserve_key_phrases: true              # Preserve common complete technical phrases in compacted queries
  retry_failed_subjects_first: true        # Give failed/no-result subjects the next retry opportunity
  stop_subject_after_success: true         # Do not spend more budget once a subject has enough usable Web supplement
  min_results_per_subject: 1               # Minimum usable results before a subject is considered successful
  llm_decision_enabled: true              # Use LLM coverage decision before rule fallback
  max_purposes_per_subject: 4             # Cap purpose labels per subject decision
  max_plan_items_per_subject: 3           # Cap search queries per subject decision

retrieval:
  mode: dual_source_evidence               # local RAG + first-round Tavily -> unified Evidence Judge
  dual_source_evidence:
    block_generation_when_evidence_judge_failed: true
  local_rag:
    enabled: true
    per_subject_top_k: 3
  web:
    enabled: true
    provider: tavily
    max_results_per_query: 3
    timeout_seconds: 30
  fusion:
    max_context_docs: 8
    max_evidence_candidates: 16
    max_local_candidates: 8
    max_web_candidates: 8
    preserve_source_type_balance: true
    min_local_docs_if_available: 1
    min_web_docs_if_available: 1
  evidence_refinement:
    enabled: false
    reserved: true
    max_rounds: 1
    search_optimization_reserved: true

llm:
  supervisor:
    provider: openrouter
    model: "deepseek/deepseek-v4-flash"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    temperature: 0.0
    max_tokens: 1200
    streaming: false
  query_rewrite:
