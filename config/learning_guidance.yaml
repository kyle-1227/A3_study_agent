schema_version: learning_guidance_config_v1
adapter_version: learning_guidance_adapters_v1
knowledge_graph_path: data/knowledge_graph.yaml
provider_projection_max_steps: 50
provider_projection_max_chars: 65536
history_limit: 200
path_policy:
  max_steps: 50
  mastery_level: 0.8
  mastery_confidence: 0.7
  reinforce_level: 0.3
  repeat_outcome_threshold: 0.5
  recent_failure_window_days: 7
recommendation_policy:
  top_n: 10
  min_combined_score: 0.2
  forgetting_horizon_days: 30
  weights:
    weakness: 0.35
    forgetting: 0.25
    preference: 0.15
    goal: 0.25
  resource_preferences:
    - resource_type: review_doc
      preference_dimension: prefer_theory
    - resource_type: mindmap
      preference_dimension: prefer_visual
    - resource_type: quiz
      preference_dimension: prefer_practice
    - resource_type: code_practice
      preference_dimension: prefer_practice
    - resource_type: video_script
      preference_dimension: prefer_examples
    - resource_type: video_animation
      preference_dimension: prefer_visual
    - resource_type: study_plan
      preference_dimension: prefer_step_by_step
