schema_version: evidence_orchestration_config_v4
max_supplement_rounds: 3
max_search_tasks_per_round: 6
max_total_search_tasks: 24
max_concurrent_tasks: 1
max_results_per_task: 3
max_requirements_per_request: 12
max_ledger_entries: 72
max_evidence_per_requirement: 4
max_consecutive_no_progress_rounds: 2
judge_partition_reask:
  schema_version: evidence_judge_partition_reask_v1
  strategy: resource_subject_partition_v1
  max_partition_calls: 4
  incomplete_partition_policy: block_resource
fallback_delivery:
  schema_version: evidence_fallback_delivery_v3
  trigger_policy:
    schema_version: evidence_fallback_trigger_v1
    supplement_round_budget_exhausted: fallback_if_evidence_eligible
    no_measurable_coverage_progress: fallback_at_configured_threshold
  eligible_resource_types:
    - review_doc
    - mindmap
    - quiz
    - code_practice
    - video_script
    - video_animation
    - study_plan
  minimum_accepted_evidence_per_resource: 1
  max_resource_generation_attempts: 1
  max_delivery_seconds_by_resource:
    review_doc: 120.0
    mindmap: 120.0
    quiz: 120.0
    code_practice: 120.0
    video_script: 240.0
    video_animation: 120.0
    study_plan: 120.0
  additional_retrieval_task_budget: 0
  runtime_identity_policy: inherit_normal_resource_runtime
  evidence_binding_policy: accepted_bound_only
  validation_policy: normal_pydantic_and_business_validators
  no_evidence_policy: block_resource
  validation_failure_policy: block_resource
  terminal_status: partial_success
web_timeout_seconds: 120.0
required_task_priority: high
supporting_task_priority: medium
retrieval_priority_weights:
  high: 1.0
  medium: 0.7
  low: 0.4
query_fingerprint_algorithm: sha256_v1
evidence_dedupe_policy: exact_identity_v1
generation_policy: per_resource_ready
candidate_failure_policy: fail_fast
source_error_policy: fail_fast
